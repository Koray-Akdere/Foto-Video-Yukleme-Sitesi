<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bizim Nişan Hatıramız</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap");

      body {
        font-family: "Poppins", sans-serif;
        background-color: #f4eee3;
      }

      .font-serif {
        font-family: "Cormorant Garamond", serif;
      }

      .davetiye-bg {
        background-image: url("davetiye-form-bg.jpg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }
    </style>
  </head>
  <body
    class="flex items-center justify-center min-h-screen p-4 sm:p-6 bg-[#f4eee3]"
  >
    <div
      class="w-full max-w-md bg-white rounded-2xl shadow-2xl relative overflow-hidden flex flex-col min-h-[620px] border border-[#d4af37]/20"
    >
      <div class="absolute inset-0 davetiye-bg z-0"></div>
      <div
        class="absolute inset-4 bg-[#fffdfa]/88 backdrop-blur-[2px] rounded-xl z-10 border border-[#d4af37]/10"
      ></div>

      <div
        class="absolute inset-6 border border-[#d4af37]/20 rounded-lg pointer-events-none z-20"
      ></div>
      <div
        class="absolute inset-7 border border-[#d4af37]/35 rounded-lg pointer-events-none z-20"
      ></div>

      <div
        class="relative z-30 flex flex-col justify-between flex-1 p-8 text-center"
      >
        <div class="pt-2 select-none">
          <div class="text-2xl mb-1">💍</div>
          <h1
            class="text-2xl md:text-3xl font-serif font-bold text-[#634a24] mb-1 tracking-wide leading-tight"
          >
            Mutlu Günümüze<br />Hoş Geldiniz!
          </h1>
          <p
            class="text-[#806943] text-[11px] font-medium max-w-xs mx-auto leading-relaxed px-2"
          >
            Fotoğraf ve videolarınızı ekleyerek anılarımıza ortak olun 💕
          </p>
        </div>

        <form id="uploadForm" class="space-y-3 my-auto w-full text-left">
          <div>
            <label class="block text-xs font-semibold text-[#523e1f] mb-1"
              >👤 İsminiz *</label
            >
            <input
              type="text"
              id="userName"
              placeholder="Adınız Soyadınız"
              class="w-full px-3 py-2 text-xs bg-[#faf6ee]/90 border border-[#bfa36f]/40 rounded-lg focus:outline-none focus:border-[#967b49] text-[#523e1f]"
              required
            />
          </div>

          <div>
            <label class="block text-xs font-semibold text-[#523e1f] mb-1"
              >✍️ Not (İsteğe bağlı)</label
            >
            <textarea
              id="userNote"
              rows="2"
              placeholder="Tebrik mesajınız..."
              class="w-full px-3 py-2 text-xs bg-[#faf6ee]/90 border border-[#bfa36f]/40 rounded-lg focus:outline-none focus:border-[#967b49] text-[#523e1f] resize-none"
            ></textarea>
          </div>

          <div class="pt-1">
            <label
              class="flex flex-col items-center justify-center w-full h-24 border-2 border-dashed border-[#bfa36f]/60 rounded-xl cursor-pointer bg-[#faf6ee]/80 hover:bg-[#f6efe0] transition-all duration-300 group"
            >
              <div
                class="flex flex-col items-center justify-center text-center py-2"
              >
                <span
                  class="text-xl group-hover:scale-110 transition-transform mb-1"
                  >📸</span
                >
                <p class="text-xs text-[#523e1f] font-semibold">
                  Medya Seç (Fotoğraf / Video)
                </p>
                <p class="text-[10px] text-[#806943] mt-0.5">
                  Birden fazla dosya seçebilirsiniz
                </p>
              </div>
              <input
                id="fileInput"
                type="file"
                class="hidden"
                multiple
                accept="image/*,video/*"
                required
              />
            </label>
          </div>

          <div class="h-4 flex items-center justify-center">
            <div
              id="fileCount"
              class="text-[10px] text-[#634a24] bg-[#f5ebd6] py-0.5 px-3 rounded font-medium hidden border border-[#bfa36f]/20 shadow-sm"
            ></div>
          </div>

          <div class="flex justify-center pt-1">
            <button
              type="submit"
              class="w-full py-2.5 px-6 bg-gradient-to-r from-[#94743f] to-[#73572b] hover:from-[#73572b] hover:to-[#543e1d] text-white font-medium text-xs rounded-lg shadow-md transition-all transform active:scale-[0.98] tracking-wider cursor-pointer text-center"
            >
              Anıları Gönder ✨
            </button>
          </div>
        </form>

        <div class="h-8 flex items-center justify-center">
          <div
            id="statusMessage"
            class="w-full text-center text-[11px] font-medium hidden p-1.5 rounded-lg shadow-inner"
          ></div>
        </div>
      </div>
    </div>

    <script>
      const fileInput = document.getElementById("fileInput");
      const fileCount = document.getElementById("fileCount");
      const uploadForm = document.getElementById("uploadForm");
      const statusMessage = document.getElementById("statusMessage");
      const userName = document.getElementById("userName");
      const userNote = document.getElementById("userNote");

      fileInput.addEventListener("change", () => {
        const count = fileInput.files.length;
        if (count > 0) {
          fileCount.textContent = `📸 ${count} dosya gönderilmeye hazır.`;
          fileCount.classList.remove("hidden");
        }
      });

      uploadForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const files = fileInput.files;
        if (files.length === 0) return;

        // FormData yapısına isim ve not alanlarını da ekliyoruz
        const formData = new FormData();
        formData.append("name", userName.value);
        formData.append("note", userNote.value);

        for (let i = 0; i < files.length; i++) {
          formData.append("media", files[i]);
        }

        statusMessage.textContent =
          "Anılarınız yükleniyor, lütfen bekleyin... ⏳";
        statusMessage.className =
          "w-full text-center text-[11px] font-medium text-[#634a24] bg-[#f5ebd6] p-1.5 rounded-lg border border-[#bfa36f]/30 animate-pulse";
        statusMessage.classList.remove("hidden");

        try {
          const response = await fetch(
            "https://foto-video-yukleme-sitesi.onrender.com/upload",
            {
              method: "POST",
              body: formData,
            },
          );

          if (response.ok) {
            statusMessage.textContent =
              "Harika! Fotoğraflarınız başarıyla albüme ulaştı. 💕";
            statusMessage.className =
              "w-full text-center text-[11px] font-medium text-green-700 bg-green-50 p-1.5 rounded-lg border border-green-200 shadow-sm";
            uploadForm.reset();
            fileCount.classList.add("hidden");
          } else {
            throw new Error("Yükleme başarısız.");
          }
        } catch (error) {
          statusMessage.textContent =
            "Bir yükleme hatası oluştu. Lütfen tekrar deneyin. ❌";
          statusMessage.className =
            "w-full text-center text-[11px] font-medium text-red-700 bg-red-50 p-1.5 rounded-lg border border-red-200 shadow-sm";
        }
      });
    </script>
  </body>
</html>
