<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ebru & Berkay Nişan Hatırası</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap");

      body {
        font-family: "Poppins", sans-serif;
        background-color: #f7f4ed; /* Soft krem arka plan */
        margin: 0;
        padding: 0;
      }

      .font-serif {
        font-family: "Cormorant Garamond", serif;
      }

      /* Lumoment tarzı, fotoğrafın alt tarafta arka plan rengine pürüzsüzce karışmasını sağlayan maske */
      .gradient-mask {
        mask-image: linear-gradient(to bottom, black 65%, transparent 100%);
        -webkit-mask-image: linear-gradient(
          to bottom,
          black 65%,
          transparent 100%
        );
      }
    </style>
  </head>
  <body class="flex flex-col items-center min-h-screen pb-12">
    <div
      class="w-full max-w-md h-[280px] relative overflow-hidden select-none z-0"
    >
      <img
        src="nisan-kapak.jpg"
        alt="Ebru & Berkay"
        class="w-full h-full object-cover gradient-mask absolute inset-0"
      />

      <div
        class="absolute inset-0 bg-black/15 flex flex-col justify-end p-6 text-white pb-12"
      >
        <h1 class="text-3xl font-serif font-bold tracking-wide drop-shadow-md">
          Ebru & Berkay Nişanı
        </h1>
        <p
          class="text-xs font-light tracking-widest mt-1 opacity-90 flex items-center gap-1 drop-shadow-sm"
        >
          📅 15 Haziran 2026
        </p>
      </div>
    </div>

    <div class="w-full max-w-md px-4 -mt-6 relative z-10 animate-fade-in">
      <div
        class="w-full bg-[#fffefb] rounded-2xl shadow-xl border border-[#d4af37]/25 p-6 text-center relative"
      >
        <div
          class="absolute inset-2 border border-[#d4af37]/15 rounded-xl pointer-events-none"
        ></div>
        <div
          class="absolute inset-3 border border-[#d4af37]/30 rounded-xl pointer-events-none"
        ></div>

        <div class="text-center pt-2 select-none">
          <div class="text-2xl mb-1">💍</div>
          <h2
            class="text-2xl font-serif font-bold text-[#634a24] mb-1 tracking-wide"
          >
            Mutlu Günümüze Hoş Geldiniz!
          </h2>
          <p
            class="text-[#806943] text-[11px] font-medium max-w-xs mx-auto leading-relaxed mb-4"
          >
            Fotoğraf ve videolarınızı ekleyerek anılarımıza ortak olun 💕
          </p>
        </div>

        <form id="uploadForm" class="space-y-3 text-left relative z-10">
          <div>
            <label class="block text-xs font-semibold text-[#523e1f] mb-1"
              >👤 İsminiz *</label
            >
            <input
              type="text"
              id="userName"
              placeholder="Adınız Soyadınız"
              class="w-full px-3 py-2 text-xs bg-[#faf6ee]/90 border border-[#bfa36f]/40 rounded-lg focus:outline-none focus:border-[#967b49] text-[#523e1f]"
              required
            />
          </div>

          <div>
            <label class="block text-xs font-semibold text-[#523e1f] mb-1"
              >✍️ Not (İsteğe bağlı)</label
            >
            <textarea
              id="userNote"
              rows="2"
              placeholder="Tebrik mesajınız..."
              class="w-full px-3 py-2 text-xs bg-[#faf6ee]/90 border border-[#bfa36f]/40 rounded-lg focus:outline-none focus:border-[#967b49] text-[#523e1f] resize-none"
            ></textarea>
          </div>

          <div class="pt-1">
            <label
              class="flex flex-col items-center justify-center w-full h-24 border-2 border-dashed border-[#bfa36f]/60 rounded-xl cursor-pointer bg-[#faf6ee]/80 hover:bg-[#f6efe0] transition-all duration-300 group"
            >
              <div
                class="flex flex-col items-center justify-center text-center py-2"
              >
                <span
                  class="text-xl group-hover:scale-110 transition-transform mb-1"
                  >📷</span
                >
                <p class="text-xs text-[#523e1f] font-semibold">
                  Medya Seç (Fotoğraf / Video)
                </p>
                <p class="text-[10px] text-[#806943] mt-0.5">
                  Birden fazla dosya seçebilirsiniz
                </p>
              </div>
              <input
                id="fileInput"
                type="file"
                class="hidden"
                multiple
                accept="image/*,video/*"
                required
              />
            </label>
          </div>

          <div class="h-4 flex items-center justify-center">
            <div
              id="fileCount"
              class="text-[10px] text-[#634a24] bg-[#f5ebd6] py-0.5 px-3 rounded font-medium hidden border border-[#bfa36f]/20 shadow-sm"
            ></div>
          </div>

          <div class="flex justify-center pt-1">
            <button
              type="submit"
              class="w-full py-2.5 px-6 bg-[#8a6d3b] hover:bg-[#6e552d] text-white font-medium text-xs rounded-lg shadow-md transition-all transform active:scale-[0.98] tracking-wider cursor-pointer text-center"
            >
              Anıları Gönder ✨
            </button>
          </div>
        </form>

        <div class="h-10 flex items-center justify-center mt-3">
          <div
            id="statusMessage"
            class="w-full text-center text-[11px] font-medium hidden p-2 rounded-lg transition-all"
          ></div>
        </div>
      </div>
    </div>

    <script>
      const fileInput = document.getElementById("fileInput");
      const fileCount = document.getElementById("fileCount");
      const uploadForm = document.getElementById("uploadForm");
      const statusMessage = document.getElementById("statusMessage");
      const userName = document.getElementById("userName");
      const userNote = document.getElementById("userNote");

      fileInput.addEventListener("change", () => {
        const count = fileInput.files.length;
        if (count > 0) {
          fileCount.textContent = `📸 ${count} dosya gönderilmeye hazır.`;
          fileCount.classList.remove("hidden");
        }
      });

      uploadForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const files = fileInput.files;
        if (files.length === 0) return;

        const formData = new FormData();
        formData.append("name", userName.value);
        formData.append("note", userNote.value);

        for (let i = 0; i < files.length; i++) {
          formData.append("media", files[i]);
        }

        statusMessage.textContent =
          "Anılarınız albüme yükleniyor, lütfen bekleyin... ⏳";
        statusMessage.className =
          "w-full text-center text-[11px] font-medium text-[#634a24] bg-[#f5ebd6] p-2 rounded-lg border border-[#bfa36f]/30 animate-pulse";
        statusMessage.classList.remove("hidden");

        try {
          const response = await fetch(
            "https://foto-video-yukleme-sitesi.onrender.com/upload",
            {
              method: "POST",
              body: formData,
            },
          );

          if (response.ok) {
            // Tam olarak son attığın ekran görüntüsündeki tatlı yeşil başarı paneli stili
            statusMessage.textContent =
              "Harika! Fotoğraflarınız başarıyla albüme ulaştı. 💕";
            statusMessage.className =
              "w-full text-center text-[11px] font-medium text-green-700 bg-green-50 p-2 rounded-lg border border-green-200 shadow-sm";
            uploadForm.reset();
            fileCount.classList.add("hidden");
          } else {
            throw new Error("Yükleme başarısız.");
          }
        } catch (error) {
          statusMessage.textContent =
            "Bir yükleme hatası oluştu. Lütfen tekrar deneyin. ❌";
          statusMessage.className =
            "w-full text-center text-[11px] font-medium text-red-700 bg-red-50 p-2 rounded-lg border border-red-200 shadow-sm";
        }
      });
    </script>
  </body>
</html>
