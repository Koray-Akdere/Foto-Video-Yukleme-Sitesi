<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ebru & Berkay Nişan Hatırası</title>
    <!-- Tailwind CSS v4 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap");

      body {
        font-family: "Poppins", sans-serif;
        background-color: #f7f4ed; /* Yumuşak krem arka plan */
      }

      .font-serif {
        font-family: "Cormorant Garamond", serif;
      }
    </style>
  </head>
  <body class="flex items-center justify-center min-h-screen p-4 sm:p-6">
    <!-- Ana Davetiye Kart Tuvali (Her şey tek bir asil çerçevenin içinde) -->
    <div
      class="w-full max-w-md bg-[#fffefb] rounded-3xl shadow-2xl border border-[#d4af37]/25 relative overflow-hidden flex flex-col"
    >
      <!-- İnce Çift Katmanlı Gold Süsleme Sınırları -->
      <div
        class="absolute inset-2 border border-[#d4af37]/15 rounded-2xl pointer-events-none z-20"
      ></div>
      <div
        class="absolute inset-3 border border-[#d4af37]/30 rounded-2xl pointer-events-none z-20"
      ></div>

      <!-- ======================================================== -->
      <!-- ÜST KISIM: YENİ GÜN BATIMI FOTOĞRAFINA ÖZEL ALAN         -->
      <!-- ======================================================== -->
      <!-- Yatay fotoğrafın kompozisyonunu ve Ebru & Berkay'ı tam merkezde tutmak için h-[240px] ve object-center yaptık -->
      <div
        class="w-full h-[240px] relative overflow-hidden z-10 border-b border-[#d4af37]/20 bg-[#eadecc]"
      >
        <!-- Çiftin Yeni Fotoğrafı -->
        <img
          id="coverImage"
          src="nisan-kapak.jpg"
          alt="Ebru & Berkay"
          class="w-full h-full object-cover object-center absolute inset-0"
          onerror="handleImageError(this)"
        />

        <!-- Fotoğrafın Altındaki Karartma Gradyanı (Yazıların cam gibi okunması için) -->
        <div
          class="absolute inset-0 bg-gradient-to-t from-black/75 via-black/25 to-transparent flex flex-col justify-end p-6 text-white z-10"
        >
          <h1
            class="text-2xl md:text-3xl font-serif font-bold tracking-wide drop-shadow-md"
          >
            Ebru & Berkay Nişanı
          </h1>
          <p
            class="text-xs font-light tracking-widest mt-1 opacity-95 flex items-center gap-1 drop-shadow-sm"
          >
            📅 22 Ağustos 2026
          </p>
        </div>
      </div>

      <!-- ======================================================== -->
      <!-- ALT KISIM: İNTERAKTİF FORM ALANI                        -->
      <!-- ======================================================== -->
      <div
        class="p-6 text-center flex-1 flex flex-col justify-between relative z-10"
      >
        <!-- Karşılama Mesajı -->
        <div class="text-center pt-1 select-none">
          <div class="text-xl mb-1">💍</div>
          <h2
            class="text-xl font-serif font-bold text-[#634a24] mb-1 tracking-wide"
          >
            Mutlu Günümüze Hoş Geldiniz!
          </h2>
          <p
            class="text-[#806943] text-[11px] font-medium max-w-xs mx-auto leading-relaxed mb-3"
          >
            Fotoğraf ve videolarınızı ekleyerek anılarımıza ortak olun 💕
          </p>
        </div>

        <!-- Form Alanı -->
        <form id="uploadForm" class="space-y-3 text-left w-full">
          <!-- İsminiz Giriş Alanı -->
          <div>
            <label class="block text-xs font-semibold text-[#523e1f] mb-1"
              >👤 İsminiz *</label
            >
            <input
              type="text"
              id="userName"
              placeholder="Adınız Soyadınız"
              class="w-full px-3 py-2 text-xs bg-[#faf6ee]/95 border border-[#bfa36f]/40 rounded-lg focus:outline-none focus:border-[#967b49] text-[#523e1f]"
              required
            />
          </div>

          <!-- Not Giriş Alanı -->
          <div>
            <label class="block text-xs font-semibold text-[#523e1f] mb-1"
              >✍️ Not (İsteğe bağlı)</label
            >
            <textarea
              id="userNote"
              rows="2"
              placeholder="Tebrik mesajınız..."
              class="w-full px-3 py-2 text-xs bg-[#faf6ee]/95 border border-[#bfa36f]/40 rounded-lg focus:outline-none focus:border-[#967b49] text-[#523e1f] resize-none"
            ></textarea>
          </div>

          <!-- Kesikli Çizgili Medya Seçim Alanı -->
          <div class="pt-1">
            <label
              class="flex flex-col items-center justify-center w-full h-24 border-2 border-dashed border-[#bfa36f]/60 rounded-xl cursor-pointer bg-[#faf6ee]/80 hover:bg-[#f6efe0] transition-all duration-300 group"
            >
              <div
                class="flex flex-col items-center justify-center text-center py-2"
              >
                <span
                  class="text-xl group-hover:scale-110 transition-transform mb-1"
                  >📷</span
                >
                <p class="text-xs text-[#523e1f] font-semibold">
                  Medya Seç (Fotoğraf / Video)
                </p>
                <p class="text-[10px] text-[#806943] mt-0.5">
                  Birden fazla dosya seçebilirsiniz
                </p>
              </div>
              <input
                id="fileInput"
                type="file"
                class="hidden"
                multiple
                accept="image/*,video/*"
                required
              />
            </label>
          </div>

          <!-- Seçilen Dosya Sayıcı -->
          <div class="h-4 flex items-center justify-center">
            <div
              id="fileCount"
              class="text-[10px] text-[#634a24] bg-[#f5ebd6] py-0.5 px-3 rounded font-medium hidden border border-[#bfa36f]/20 shadow-sm"
            ></div>
          </div>

          <!-- Gönderme Butonu -->
          <div class="flex justify-center pt-1">
            <button
              type="submit"
              class="w-full py-2.5 px-6 bg-[#8a6d3b] hover:bg-[#6e552d] text-white font-medium text-xs rounded-lg shadow-md transition-all transform active:scale-[0.98] tracking-wider cursor-pointer text-center"
            >
              Anıları Gönder ✨
            </button>
          </div>
        </form>

        <!-- Canlı Durum / Başarı Bildirim Alanı -->
        <div class="h-10 flex items-center justify-center mt-2">
          <div
            id="statusMessage"
            class="w-full text-center text-[11px] font-medium hidden p-2 rounded-lg transition-all"
          ></div>
        </div>
      </div>
    </div>

    <script>
      // Sunucu taraflı isimlendirme senkronizasyon hatası koruması
      let attempt = 0;
      function handleImageError(img) {
        attempt++;
        if (attempt === 1) {
          img.src = "nisan-kapak.JPG";
        } else if (attempt === 2) {
          img.src = "nisan-kapak.jpeg";
        } else if (attempt === 3) {
          img.src = "WhatsApp Image 2026-06-15 at 22.03.49.jpg";
        } else if (attempt === 4) {
          img.src = "WhatsApp%20Image%202026-06-15%20at%2022.03.49.jpg";
        } else {
          img.style.display = "none";
        }
      }

      const fileInput = document.getElementById("fileInput");
      const fileCount = document.getElementById("fileCount");
      const uploadForm = document.getElementById("uploadForm");
      const statusMessage = document.getElementById("statusMessage");
      const userName = document.getElementById("userName");
      const userNote = document.getElementById("userNote");

      fileInput.addEventListener("change", () => {
        const count = fileInput.files.length;
        if (count > 0) {
          fileCount.textContent = `📸 ${count} dosya gönderilmeye hazır.`;
          fileCount.classList.remove("hidden");
        }
      });

      uploadForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const files = fileInput.files;
        if (files.length === 0) return;

        const formData = new FormData();
        formData.append("name", userName.value);
        formData.append("note", userNote.value);

        for (let i = 0; i < files.length; i++) {
          formData.append("media", files[i]);
        }

        statusMessage.textContent =
          "Anılarınız albüme yükleniyor, lütfen bekleyin... ⏳";
        statusMessage.className =
          "w-full text-center text-[11px] font-medium text-[#634a24] bg-[#f5ebd6] p-2 rounded-lg border border-[#bfa36f]/30 animate-pulse";
        statusMessage.classList.remove("hidden");

        try {
          const response = await fetch(
            "https://foto-video-yukleme-sitesi.onrender.com/upload",
            {
              method: "POST",
              body: formData,
            },
          );

          if (response.ok) {
            statusMessage.textContent =
              "Harika! Fotoğraflarınız başarıyla albüme ulaştı. 💕";
            statusMessage.className =
              "w-full text-center text-[11px] font-medium text-green-700 bg-green-50 p-2 rounded-lg border border-green-200 shadow-sm";
            uploadForm.reset();
            fileCount.classList.add("hidden");
          } else {
            throw new Error("Yükleme başarısız.");
          }
        } catch (error) {
          statusMessage.textContent =
            "Bir yükleme hatası oluştu. Lütfen tekrar deneyin. ❌";
          statusMessage.className =
            "w-full text-center text-[11px] font-medium text-red-700 bg-red-50 p-2 rounded-lg border border-red-200 shadow-sm";
        }
      });
    </script>
  </body>
</html>
